_schema-version: 3.3.0
ID: Project_and_TimeSheet_Management_System
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: Project_and_TimeSheet_Management_System-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: Project_and_TimeSheet_Management_System-db
      - name: Project_and_TimeSheet_Management_System-destination
      - name: Project_and_TimeSheet_Management_System-auth
      - name: Project_and_TimeSheet_Management_System-logging
      - name: Project_and_TimeSheet_Management_System-autoscaler # ← add this
      - name: Project_and_TimeSheet_Management_System-jobscheduler

  - name: Project_and_TimeSheet_Management_System-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: Project_and_TimeSheet_Management_System-db
  - name: Project_and_TimeSheet_Management_System
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: Project_and_TimeSheet_Management_System-html5-runtime
      - name: Project_and_TimeSheet_Management_System-auth
      - name: Project_and_TimeSheet_Management_System-logging
      - name: Project_and_TimeSheet_Management_System-autoscaler # ← add this
      - name: Project_and_TimeSheet_Management_System-jobscheduler
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: Project_and_TimeSheet_Management_System-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: Project_and_TimeSheet_Management_Systememployee_timesheets_dashboard
          artifacts:
            - employee_timesheets_dashboard.zip
          target-path: app/
        - name: Project_and_TimeSheet_Management_Systemproject_manager_dashboard
          artifacts:
            - project_manager_dashboard.zip
          target-path: app/
    requires:
      - name: srv-api
      - name: Project_and_TimeSheet_Management_System-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
      - name: Project_and_TimeSheet_Management_System-auth
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: Project_and_TimeSheet_Management_Systememployee_timesheets_dashboard
    type: html5
    path: app/employee_timesheets_dashboard
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: Project_and_TimeSheet_Management_Systemproject_manager_dashboard
    type: html5
    path: app/project_manager_dashboard
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: Project_and_TimeSheet_Management_System-destinations
    type: com.sap.application.content
    requires:
      - name: Project_and_TimeSheet_Management_System-html5-repo-host
        parameters:
          service-key:
            name: Project_and_TimeSheet_Management_System-html5-repo-host-key
      - name: srv-api
      - name: Project_and_TimeSheet_Management_System-destination
        parameters:
          content-target: true
      - name: Project_and_TimeSheet_Management_System-auth
        parameters:
          service-key:
            name: Project_and_TimeSheet_Management_System-auth-key
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: Project_and_TimeSheet_Management_System-html5-repository
              ServiceInstanceName: Project_and_TimeSheet_Management_System-html5-repo-host
              ServiceKeyName: Project_and_TimeSheet_Management_System-html5-repo-host-key
              sap.cloud.service: Project_and_TimeSheet_Management_System.service
            - Name: Project_and_TimeSheet_Management_System-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: Project_and_TimeSheet_Management_System-auth
              ServiceKeyName: Project_and_TimeSheet_Management_System-auth-key
              sap.cloud.service: Project_and_TimeSheet_Management_System.service

resources:
  - name: Project_and_TimeSheet_Management_System-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: Project_and_TimeSheet_Management_System-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
    requires:
      - name: srv-api

  - name: Project_and_TimeSheet_Management_System-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: Project_and_TimeSheet_Management_System-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: Project_and_TimeSheet_Management_System-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite
  - name: Project_and_TimeSheet_Management_System-autoscaler
    type: org.cloudfoundry.managed-service
    parameters:
      service: autoscaler
      service-plan: standard
  - name: Project_and_TimeSheet_Management_System-jobscheduler
    type: org.cloudfoundry.managed-service
    parameters:
      service: jobscheduler
      service-plan: free
      config:
        enable-oauth2: true
        xsuaa:
          xsappname: Project_and_TimeSheet_Management_System-${org}-${space}
        authorities:
          - "$XSAPPNAME.JobScheduler"
    requires:
      - name: Project_and_TimeSheet_Management_System-auth
  - name: Project_and_TimeSheet_Management_System-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: Project_and_TimeSheet_Management_System-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'developer (Project_and_TimeSheet_Management_System ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.developer'
          - name: 'projectManager (Project_and_TimeSheet_Management_System ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.projectManager'
          - name: 'admin (Project_and_TimeSheet_Management_System ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
    requires:
      - name: app-api
